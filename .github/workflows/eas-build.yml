name: EAS Cloud Build (Android APK)

# Alternative to the local build workflow.
# Triggers an Expo Application Services (EAS) cloud build — no local Android
# toolchain needed. The signed APK is downloadable from expo.dev after the build.
#
# ────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (do this once from your local machine):
#   1. npm install -g eas-cli
#   2. eas login           (create account at https://expo.dev if needed)
#   3. cd mobile
#   4. eas build:configure (this updates app.json with your real projectId)
#   5. eas credentials     (let EAS generate/manage your keystore)
#   6. git commit & push   (commit the updated app.json)
# ────────────────────────────────────────────────────────────────────────────
# Required GitHub repository secret:
#   EXPO_TOKEN — personal access token from https://expo.dev/accounts/<user>/settings/access-tokens
# ────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eas-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_NO_TELEMETRY: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # expo-github-action installs eas-cli and authenticates using EXPO_TOKEN
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Trigger a cloud build using the "release-apk" profile in eas.json.
      # --non-interactive prevents prompts; the build runs remotely on EAS servers.
      # Download the resulting APK from https://expo.dev once the build completes.
      - name: Build APK via EAS Cloud
        working-directory: mobile
        run: |
          eas build \
            --platform android \
            --profile release-apk \
            --non-interactive \
            --wait
