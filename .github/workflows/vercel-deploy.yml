name: Vercel Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show target Vercel project
        run: |
          echo "Using Vercel org: $VERCEL_ORG_ID"
          echo "Using Vercel project: $VERCEL_PROJECT_ID"

      - name: Pin Vercel project mapping
        shell: bash
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
